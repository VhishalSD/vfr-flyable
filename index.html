<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFR Flyable</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Topbar -->
    <header class="topbar">
        <div class="topbar-logo">
            <span class="logo-icon">✈</span>
            <div class="logo-text">
                <strong>VFR Flyable</strong>
                <small>Visual flight weather map</small>
            </div>
        </div>
        <div class="topbar-search">
            <input type="text" id="airport-search" placeholder="Airport, city or ICAO code">
            <button id="search-button" type="button">&#128269;</button>
        </div>
    </header>

    <!-- Left toolbar -->
    <div class="layer-toolbar">
        <button class="layer-btn active" id="layer-category" title="Flight categories">V</button>
        <div class="layer-divider"></div>
        <button class="layer-btn" id="layer-country" title="Filter by country">&#127758;</button>
        <button class="layer-btn" id="layer-category-filter" title="Filter by category">&#9881;</button>
        <div class="layer-divider"></div>
        <button class="layer-btn" id="refresh-weather-button" title="Refresh weather">&#8635;</button>
        <button class="layer-btn" id="reset-view-button" title="Reset view">&#10021;</button>
        <div class="layer-divider"></div>
        <button class="layer-btn" id="layer-zoom-in" title="Zoom in">+</button>
        <button class="layer-btn" id="layer-zoom-out" title="Zoom out">−</button>
    </div>

    <!-- Filter panel (hidden by default, toggled by toolbar) -->
    <div class="filter-panel" id="filter-panel">
        <div class="filter-panel-title">Filters</div>

        <label class="filter-label" for="country-filter">Country</label>
        <select id="country-filter">
            <option value="ALL">All countries</option>
            <option value="Netherlands">Netherlands</option>
            <option value="Belgium">Belgium</option>
            <option value="France">France</option>
            <option value="Germany">Germany</option>
            <option value="United Kingdom">United Kingdom</option>
        </select>

        <label class="filter-label" for="category-filter">Category</label>
        <select id="category-filter">
            <option value="ALL">All categories</option>
            <option value="VFR">VFR</option>
            <option value="MVFR">MVFR</option>
            <option value="IFR">IFR</option>
            <option value="LIFR">LIFR</option>
        </select>

        <div id="last-updated" class="last-updated">Last updated: —</div>
        <div id="data-status" class="data-status"></div>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Right sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-header-info">
                <div class="sidebar-icao" id="sidebar-icao">—</div>
                <div class="sidebar-name" id="sidebar-name">Select an airport</div>
                <div class="sidebar-location" id="sidebar-location"></div>
            </div>
            <button class="sidebar-close-btn" id="sidebar-close">&#10005;</button>
        </div>

        <div class="sidebar-summary" id="sidebar-summary">
            <div class="sidebar-category-badge" id="sidebar-category-badge">—</div>
            <div class="sidebar-summary-details">
                <div class="sidebar-visib" id="sidebar-visib"></div>
                <div class="sidebar-wxstring" id="sidebar-wxstring"></div>
            </div>
            <div class="sidebar-temp" id="sidebar-temp"></div>
        </div>

        <div class="sidebar-compass-wrapper">
            <canvas id="wind-compass" width="280" height="280"></canvas>
            <div class="sidebar-wind-label" id="sidebar-wind-label"></div>
        </div>

        <div class="sidebar-metar-link">
            View full METAR &amp; TAF ›
        </div>

        <div class="sidebar-raw" id="sidebar-raw-metar"></div>
    </div>

    <!-- Legend -->
    <div class="legend">
        <div class="legend-title">Flight category</div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#00b300"></div>
            <span>VFR — &gt;5 SM, &gt;3000 ft</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#0066ff"></div>
            <span>MVFR — 3–5 SM, 1000–3000 ft</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#cc0000"></div>
            <span>IFR — 1–3 SM, 500–1000 ft</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#990099"></div>
            <span>LIFR — &lt;1 SM, &lt;500 ft</span>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
