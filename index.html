<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFR Flyable</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="search-panel">
        <label for="airport-search">Search airport</label>
        <input type="text" id="airport-search" placeholder="Example: EHAM or Amsterdam">
        <button id="search-button" type="button">Search</button>
        <label for="country-filter">Country</label>
        <select id="country-filter">
            <option value="ALL">All countries</option>
            <option value="Netherlands">Netherlands</option>
            <option value="Belgium">Belgium</option>
            <option value="France">France</option>
            <option value="Germany">Germany</option>
            <option value="United Kingdom">United Kingdom</option>
        </select>
        <label for="category-filter">Category</label>
        <select id="category-filter">
            <option value="ALL">All categories</option>
            <option value="VFR">VFR</option>
            <option value="MVFR">MVFR</option>
            <option value="IFR">IFR</option>
            <option value="LIFR">LIFR</option>
        </select>
        <button id="refresh-weather-button" type="button">Refresh weather</button>
        <button id="reset-view-button" type="button">Reset view</button>
        <span id="last-updated" class="last-updated">Last updated: —</span>
    </div>

    <div class="legend">
        <div class="legend-title">Flight category</div>
        <div class="legend-item">
            <div class="legend-color" style="background:#00b300"></div>
            <span>VFR — &gt;5 SM, &gt;3000 ft</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background:#0066ff"></div>
            <span>MVFR — 3–5 SM, 1000–3000 ft</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background:#cc0000"></div>
            <span>IFR — 1–3 SM, 500–1000 ft</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background:#990099"></div>
            <span>LIFR — &lt;1 SM, &lt;500 ft</span>
        </div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
